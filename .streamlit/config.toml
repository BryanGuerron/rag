[server]
headless = true
address = "0.0.0.0"
port = 8501
maxUploadSize = 20
enableXsrfProtection = true
enableCORS = true
# Publica ./static para poder abrir un documento citado en su página exacta.
enableStaticServing = true

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#22d3ee"
backgroundColor = "#05070f"
secondaryBackgroundColor = "#0e1526"
textColor = "#e8eefb"
font = "sans serif"
