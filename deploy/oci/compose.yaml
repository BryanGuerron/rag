services:
  document-assistant:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: rag-alura:latest
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DATA_DIR: /app/data
    ports:
      - "8501:8501"
    volumes:
      - rag-data:/app/data

volumes:
  rag-data:
